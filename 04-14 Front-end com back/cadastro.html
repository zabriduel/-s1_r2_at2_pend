<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Produto</title>

    <link rel="stylesheet" href="./css/main.css">

    <script src="./js/create.js" defer></script>
</head>

<body class="page-cadastro">

    <a href="index.html" class="back-link">Voltar</a>

    <h1 id="titulo">Novo Produto</h1>

    <form id="formProduto">

        <label>Nome</label>
        <input type="text" id="fNomeProd">

        <label>Valor</label>
        <input type="text" id="fValor">

        <label>Categoria</label>
        <select id="fCategoria"></select>

        <label>Imagem</label>
        <input type="file" id="imagem">

        <img id="previewImagem">

        <button type="submit" id="post">Cadastrar</button>

    </form>

    <div id="toast" class="toast"></div>

    <script>
        document.getElementById("imagem").addEventListener("change", function () {
            const file = this.files[0];
            const preview = document.getElementById("previewImagem");

            if (file) {
                const reader = new FileReader();

                reader.onload = function (e) {
                    preview.src = e.target.result;
                    preview.style.display = "block";
                };

                reader.readAsDataURL(file);
            }
        });

        function showToast(msg) {
            const toast = document.getElementById("toast");
            toast.textContent = msg;
            toast.classList.add("show");

            setTimeout(() => {
                toast.classList.remove("show");
            }, 3000);
        }

        window.showToast = showToast;
    </script>

</body>

</html>
