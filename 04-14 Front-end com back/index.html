<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja do Gabs</title>

    <link rel="stylesheet" href="./css/main.css">

    <script src="./js/edit.js" defer></script>
    <script src="./js/list.js" defer></script>
</head>

<body>

    <header class="top-bar">
        <h1>Produtos</h1>
        <a href="cadastro.html" class="btn-primary">+ Novo Produto</a>
    </header>

    <div id="produtosContainer"></div>

    <div id="modalOverlay" style="display:none;">
        <div id="modalEdit">
            <h2>Editar Produto</h2>

            <form>
                <label>Nome</label>
                <input type="text" id="eNomeProd">

                <label>Valor</label>
                <input type="text" id="eValor">

                <label>Categoria</label>
                <select id="eCategoria"></select>

                <label>Imagem</label>
                <input type="file" id="eImagem">
            </form>

            <div class="modal-actions">
                <button id="btnSalvarEdicao" class="btn-edit">Salvar</button>
                <button id="btnCancelarEdicao">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="modalDeleteOverlay" style="display:none;">
        <div id="modalDelete">
            <h2>Excluir Produto</h2>
            <p>Tem certeza?</p>

            <div class="modal-actions">
                <button id="btnConfirmarDelete" class="btn-danger">Excluir</button>
                <button id="btnCancelarDelete">Cancelar</button>
            </div>
        </div>
    </div>

</body>

</html>
